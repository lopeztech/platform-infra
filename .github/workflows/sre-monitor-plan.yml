name: sre-monitor — Plan

on:
  pull_request:
    paths:
      - 'projects/sre-monitor/**'

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      TF_DIR: projects/sre-monitor
      TF_ENV: prod
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.SRE_MONITOR_WIF_PROVIDER }}
          service_account: ${{ secrets.SRE_MONITOR_SA_EMAIL }}

      - name: Terraform Init
        run: |
          terraform -chdir=${{ env.TF_DIR }} init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/sre-monitor/${{ env.TF_ENV }}" \
            -input=false

      - name: Terraform Plan
        id: plan
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          terraform -chdir=${{ env.TF_DIR }} plan \
            -var-file="environments/${{ env.TF_ENV }}/terraform.tfvars" \
            -input=false \
            -no-color \
            -out=tfplan 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Comment plan on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(-60000) + '\n\n...(truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — \`sre-monitor/prod\`\n\`\`\`\n${truncated}\n\`\`\``
            });
