name: finance-doctor — Apply

on:
  push:
    branches:
      - master
    paths:
      - 'projects/finance-doctor/**'
      - 'modules/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      TF_DIR: projects/finance-doctor
      TF_ENV: prod
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.6"

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.FINANCE_DOCTOR_WIF_PROVIDER }}
          service_account: ${{ secrets.FINANCE_DOCTOR_SA_EMAIL }}

      - name: Terraform Init
        run: |
          terraform -chdir=${{ env.TF_DIR }} init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/finance-doctor/${{ env.TF_ENV }}" \
            -input=false

      - name: Terraform Apply
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          terraform -chdir=${{ env.TF_DIR }} apply \
            -var-file="environments/${{ env.TF_ENV }}/terraform.tfvars" \
            -var="billing_account=${{ secrets.BILLING_ACCOUNT_ID }}" \
            -input=false \
            -auto-approve

  verify:
    needs: apply
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: finance-doctor-lcd
      REGION: australia-southeast1
    steps:
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.FINANCE_DOCTOR_WIF_PROVIDER }}
          service_account: ${{ secrets.FINANCE_DOCTOR_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Verify infrastructure
        run: |
          set -euo pipefail
          PASS=0; FAIL=0; ERRORS=()

          check() {
            local label="$1"; shift
            if "$@" &>/dev/null; then
              echo "  ✅ $label"; ((PASS++)) || true
            else
              echo "  ❌ $label"; ((FAIL++)) || true; ERRORS+=("$label")
            fi
          }

          echo "── APIs ──"
          for api in iam.googleapis.com run.googleapis.com \
                     secretmanager.googleapis.com monitoring.googleapis.com \
                     people.googleapis.com; do
            check "API: $api" \
              gcloud services list --project="$PROJECT_ID" --filter="config.name=$api" --format="value(state)"
          done

          echo "── Secrets ──"
          for secret in google-oauth-client-id google-oauth-client-secret nextauth-secret; do
            check "Secret: $secret" \
              gcloud secrets describe "$secret" --project="$PROJECT_ID" --format="value(name)"
          done

          echo "── Cloud Run ──"
          check "Cloud Run service: finance-doctor" \
            gcloud run services describe finance-doctor --project="$PROJECT_ID" --region="$REGION" --format="value(name)"

          echo "── Artifact Registry ──"
          check "AR repo: finance-doctor-images" \
            gcloud artifacts repositories describe finance-doctor-images --project="$PROJECT_ID" --location="$REGION" --format="value(name)"

          echo "── Service Accounts ──"
          check "SA: finance-doctor-runtime" \
            gcloud iam service-accounts describe "finance-doctor-runtime@${PROJECT_ID}.iam.gserviceaccount.com" --project="$PROJECT_ID" --format="value(email)"

          echo "── DNS ──"
          check "CNAME finance.lopezcloud.dev resolves" \
            nslookup finance.lopezcloud.dev

          echo ""
          echo "════════════════════════════════════════"
          echo "  Passed: $PASS  Failed: $FAIL"
          if [[ ${#ERRORS[@]} -gt 0 ]]; then
            echo "  Failures:"
            for e in "${ERRORS[@]}"; do echo "    - $e"; done
          fi
          echo "════════════════════════════════════════"
          [[ $FAIL -eq 0 ]]
