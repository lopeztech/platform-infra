name: sre-monitor — Apply

on:
  push:
    branches:
      - master
    paths:
      - 'projects/sre-monitor/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: production
    env:
      TF_DIR: projects/sre-monitor
      TF_ENV: prod
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.SRE_MONITOR_WIF_PROVIDER }}
          service_account: ${{ secrets.SRE_MONITOR_SA_EMAIL }}

      - name: Terraform Init
        run: |
          terraform -chdir=${{ env.TF_DIR }} init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/sre-monitor/${{ env.TF_ENV }}" \
            -input=false

      - name: Terraform Apply
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          terraform -chdir=${{ env.TF_DIR }} apply \
            -var-file="environments/${{ env.TF_ENV }}/terraform.tfvars" \
            -input=false \
            -auto-approve
