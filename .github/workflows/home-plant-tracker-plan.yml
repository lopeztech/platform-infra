name: home-plant-tracker — Plan

on:
  pull_request:
    paths:
      - 'projects/home-plant-tracker/**'
      - 'modules/**'

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      TF_DIR: projects/home-plant-tracker
      TF_ENV: prod
      TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.6"

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-providers-${{ hashFiles('projects/home-plant-tracker/.terraform.lock.hcl') }}
          restore-keys: terraform-providers-

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.HOME_PLANT_TRACKER_WIF_PROVIDER }}
          service_account: ${{ secrets.HOME_PLANT_TRACKER_SA_EMAIL }}

      - name: Terraform Init
        run: |
          terraform -chdir=${{ env.TF_DIR }} init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/home-plant-tracker/${{ env.TF_ENV }}" \
            -input=false

      - name: Terraform Plan
        id: plan
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          terraform -chdir=${{ env.TF_DIR }} plan \
            -var-file="environments/${{ env.TF_ENV }}/terraform.tfvars" \
            -var="ml_admin_token=${{ secrets.ML_ADMIN_TOKEN }}" \
            -var="function_source_object=${{ secrets.HOME_PLANT_TRACKER_FUNCTION_SOURCE_OBJECT }}" \
            -var="billing_account=${{ secrets.BILLING_ACCOUNT_ID }}" \
            -input=false \
            -no-color \
            -out=tfplan 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Comment plan on PR
        uses: actions/github-script@v8
        if: always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(-60000) + '\n\n...(truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — \`home-plant-tracker/prod\`\n\`\`\`\n${truncated}\n\`\`\``
            });
