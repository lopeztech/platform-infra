name: data-feeder — Apply

on:
  push:
    branches:
      - master
    paths:
      - 'projects/data-feeder/**'
      - 'modules/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: production
    env:
      TF_DIR: projects/data-feeder
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.6"
          terraform_wrapper: false

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-providers-${{ hashFiles('projects/data-feeder/.terraform.lock.hcl') }}
          restore-keys: terraform-providers-

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.DATA_FEEDER_WIF_PROVIDER }}
          service_account: ${{ secrets.DATA_FEEDER_SA_EMAIL }}

      - name: Terraform Init
        run: |
          terraform -chdir=${{ env.TF_DIR }} init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/data-feeder" \
            -input=false

      - name: Terraform Apply
        run: |
          terraform -chdir=${{ env.TF_DIR }} apply \
            -var-file="terraform.tfvars" \
            -var="billing_account=${{ secrets.BILLING_ACCOUNT_ID }}" \
            -input=false \
            -auto-approve \
            -parallelism=30

  verify:
    needs: apply
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: data-feeder-lcd
      REGION: australia-southeast1
      DOMAIN: datafeeder.lopezcloud.dev
    steps:
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.DATA_FEEDER_WIF_PROVIDER }}
          service_account: ${{ secrets.DATA_FEEDER_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Verify infrastructure
        run: |
          set -euo pipefail
          PASS=0; FAIL=0; ERRORS=()

          check() {
            local label="$1"; shift
            if "$@" &>/dev/null; then
              echo "  ✅ $label"; ((PASS++)) || true
            else
              echo "  ❌ $label"; ((FAIL++)) || true; ERRORS+=("$label")
            fi
          }

          check_value() {
            local label="$1" expected="$2" actual="$3"
            if [[ "$actual" == *"$expected"* ]]; then
              echo "  ✅ $label"; ((PASS++)) || true
            else
              echo "  ❌ $label (expected: $expected, got: $actual)"; ((FAIL++)) || true; ERRORS+=("$label")
            fi
          }

          echo "── Cloud Run ──"
          check "Cloud Run service: data-feeder-api" \
            gcloud run services describe data-feeder-api --project="$PROJECT_ID" --region="$REGION" --format="value(name)"
          INGRESS=$(gcloud run services describe data-feeder-api --project="$PROJECT_ID" --region="$REGION" --format="value(metadata.annotations['run.googleapis.com/ingress'])" 2>/dev/null || echo "")
          check_value "Cloud Run ingress = all" "all" "$INGRESS"

          echo "── Load Balancer & SSL ──"
          check "SSL cert: data-feeder-cert" \
            gcloud compute ssl-certificates describe data-feeder-cert --project="$PROJECT_ID" --global --format="value(name)"
          CERT_DOMAINS=$(gcloud compute ssl-certificates describe data-feeder-cert --project="$PROJECT_ID" --global --format="value(managed.domains)" 2>/dev/null || echo "")
          check_value "SSL cert covers $DOMAIN" "$DOMAIN" "$CERT_DOMAINS"
          check "HTTPS forwarding rule (443)" \
            gcloud compute forwarding-rules describe data-feeder-https-forwarding --project="$PROJECT_ID" --global --format="value(name)"

          echo ""
          echo "════════════════════════════════════════"
          echo "  Passed: $PASS  Failed: $FAIL"
          if [[ ${#ERRORS[@]} -gt 0 ]]; then
            echo "  Failures:"
            for e in "${ERRORS[@]}"; do echo "    - $e"; done
          fi
          echo "════════════════════════════════════════"
          [[ $FAIL -eq 0 ]]
