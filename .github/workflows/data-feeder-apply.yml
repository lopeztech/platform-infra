name: data-feeder — Apply

on:
  push:
    branches:
      - master
    paths:
      - 'projects/data-feeder/**'
      - 'modules/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: production
    env:
      TF_DIR: projects/data-feeder
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.6"
          terraform_wrapper: false

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-providers-${{ hashFiles('projects/data-feeder/.terraform.lock.hcl') }}
          restore-keys: terraform-providers-

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.DATA_FEEDER_WIF_PROVIDER }}
          service_account: ${{ secrets.DATA_FEEDER_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Ensure Firebase project exists
        run: |
          if ! gcloud firebase projects:describe data-feeder-lcd &>/dev/null; then
            gcloud firebase projects:addfirebase data-feeder-lcd || true
          fi

      - name: Terraform Init
        run: |
          terraform -chdir=${{ env.TF_DIR }} init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/data-feeder" \
            -input=false

      - name: Terraform Apply
        run: |
          terraform -chdir=${{ env.TF_DIR }} apply \
            -var-file="terraform.tfvars" \
            -var="billing_account=${{ secrets.BILLING_ACCOUNT_ID }}" \
            -input=false \
            -auto-approve \
            -parallelism=30

  verify:
    needs: apply
    if: always() && needs.apply.result == 'success'
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: data-feeder-lcd
      REGION: australia-southeast1
      DOMAIN: datafeeder.lopezcloud.dev
    steps:
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.DATA_FEEDER_WIF_PROVIDER }}
          service_account: ${{ secrets.DATA_FEEDER_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Verify infrastructure
        run: |
          set -euo pipefail
          PASS=0; FAIL=0; ERRORS=()

          check() {
            local label="$1"; shift
            if "$@" &>/dev/null; then
              echo "  ✅ $label"; ((PASS++)) || true
            else
              echo "  ❌ $label"; ((FAIL++)) || true; ERRORS+=("$label")
            fi
          }

          echo "── Firebase Hosting ──"
          check "Firebase Hosting site: ${PROJECT_ID}" \
            curl -sf -H "Authorization: Bearer $(gcloud auth print-access-token)" \
              "https://firebasehosting.googleapis.com/v1beta1/projects/${PROJECT_ID}/sites/${PROJECT_ID}"

          echo ""
          echo "════════════════════════════════════════"
          echo "  Passed: $PASS  Failed: $FAIL"
          if [[ ${#ERRORS[@]} -gt 0 ]]; then
            echo "  Failures:"
            for e in "${ERRORS[@]}"; do echo "    - $e"; done
          fi
          echo "════════════════════════════════════════"
          [[ $FAIL -eq 0 ]]
