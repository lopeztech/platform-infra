name: data-feeder — Apply

on:
  push:
    branches:
      - master
    paths:
      - 'projects/data-feeder/**'
      - 'modules/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to apply'
        required: true
        type: choice
        options: [dev, staging, prod]

permissions:
  contents: read
  id-token: write

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  # ── dev ───────────────────────────────────────────────────────────────────────
  apply-dev:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      TF_DIR: projects/data-feeder
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.DATA_FEEDER_WIF_PROVIDER }}
          service_account: ${{ secrets.DATA_FEEDER_SA_EMAIL }}

      - name: Terraform Init
        run: |
          terraform -chdir=${{ env.TF_DIR }} init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/data-feeder/dev" \
            -input=false \
            -upgrade

      - name: Terraform Apply
        run: |
          terraform -chdir=${{ env.TF_DIR }} apply \
            -var-file="environments/dev/terraform.tfvars" \
            -input=false \
            -auto-approve

  # ── staging (after dev) ───────────────────────────────────────────────────────
  apply-staging:
    needs: apply-dev
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      TF_DIR: projects/data-feeder
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.DATA_FEEDER_WIF_PROVIDER }}
          service_account: ${{ secrets.DATA_FEEDER_SA_EMAIL }}

      - name: Terraform Init
        run: |
          terraform -chdir=${{ env.TF_DIR }} init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/data-feeder/staging" \
            -input=false \
            -upgrade

      - name: Terraform Apply
        run: |
          terraform -chdir=${{ env.TF_DIR }} apply \
            -var-file="environments/staging/terraform.tfvars" \
            -input=false \
            -auto-approve

  # ── prod (after staging, requires approval) ───────────────────────────────────
  apply-prod:
    needs: apply-staging
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    env:
      TF_DIR: projects/data-feeder
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.DATA_FEEDER_WIF_PROVIDER }}
          service_account: ${{ secrets.DATA_FEEDER_SA_EMAIL }}

      - name: Terraform Init
        run: |
          terraform -chdir=${{ env.TF_DIR }} init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/data-feeder/prod" \
            -input=false \
            -upgrade

      - name: Terraform Apply
        run: |
          terraform -chdir=${{ env.TF_DIR }} apply \
            -var-file="environments/prod/terraform.tfvars" \
            -input=false \
            -auto-approve

  # ── Manual dispatch (single env) ─────────────────────────────────────────────
  apply-dispatch:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    env:
      TF_DIR: projects/data-feeder
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.DATA_FEEDER_WIF_PROVIDER }}
          service_account: ${{ secrets.DATA_FEEDER_SA_EMAIL }}

      - name: Terraform Init
        run: |
          terraform -chdir=${{ env.TF_DIR }} init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/data-feeder/${{ inputs.environment }}" \
            -input=false \
            -upgrade

      - name: Terraform Apply
        run: |
          terraform -chdir=${{ env.TF_DIR }} apply \
            -var-file="environments/${{ inputs.environment }}/terraform.tfvars" \
            -input=false \
            -auto-approve
