name: data-feeder — Plan

on:
  pull_request:
    paths:
      - 'projects/data-feeder/**'
      - 'modules/**'

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      TF_DIR: projects/data-feeder
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.DATA_FEEDER_WIF_PROVIDER }}
          service_account: ${{ secrets.DATA_FEEDER_SA_EMAIL }}

      - name: Terraform Init
        run: |
          terraform -chdir=${{ env.TF_DIR }} init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/data-feeder" \
            -input=false \
            -upgrade

      - name: Terraform Plan
        id: plan
        run: |
          terraform -chdir=${{ env.TF_DIR }} plan \
            -var-file="terraform.tfvars" \
            -input=false \
            -no-color \
            -out=tfplan 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Comment plan on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(-60000) + '\n\n...(truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — \`data-feeder\`\n\`\`\`\n${truncated}\n\`\`\``
            });
