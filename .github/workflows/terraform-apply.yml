name: Terraform Apply

on:
  push:
    branches:
      - main
    paths:
      - 'projects/**'
      - 'modules/**'

  # Triggered by other repos (e.g. home-plant-tracker after building a new
  # function ZIP) or manually to apply a single project/environment.
  workflow_dispatch:
    inputs:
      project:
        description: 'Project to apply'
        required: true
        type: choice
        options:
          - home-plant-tracker
          - data-feeder
      environment:
        description: 'Environment to apply'
        required: true
        type: choice
        options:
          - prod
          - staging
          - dev
      function_source_object:
        description: 'Cloud Function source ZIP object name (home-plant-tracker only)'
        required: false
        type: string

permissions:
  contents: read
  id-token: write

# ── Detect changes (push trigger) ─────────────────────────────────────────────
jobs:
  detect-changes:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      home-plant-tracker: ${{ steps.filter.outputs.home-plant-tracker }}
      data-feeder: ${{ steps.filter.outputs.data-feeder }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            home-plant-tracker:
              - 'projects/home-plant-tracker/**'
              - 'modules/**'
            data-feeder:
              - 'projects/data-feeder/**'
              - 'modules/**'

  # ── home-plant-tracker/prod ──────────────────────────────────────────────────
  apply-home-plant-tracker:
    needs: detect-changes
    if: |
      github.event_name == 'push' &&
      needs.detect-changes.outputs.home-plant-tracker == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.HOME_PLANT_TRACKER_WIF_PROVIDER }}
          service_account: ${{ secrets.HOME_PLANT_TRACKER_SA_EMAIL }}
      - name: Terraform Init
        run: |
          terraform -chdir=projects/home-plant-tracker init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/home-plant-tracker/prod" \
            -input=false
      - name: Terraform Apply
        run: |
          terraform -chdir=projects/home-plant-tracker apply \
            -var-file="environments/prod/terraform.tfvars" \
            -var="gemini_api_key=${{ secrets.GEMINI_API_KEY }}" \
            -var="function_source_object=${{ secrets.HOME_PLANT_TRACKER_FUNCTION_SOURCE_OBJECT }}" \
            -input=false \
            -auto-approve

  # ── data-feeder/dev ──────────────────────────────────────────────────────────
  apply-data-feeder-dev:
    needs: detect-changes
    if: |
      github.event_name == 'push' &&
      needs.detect-changes.outputs.data-feeder == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.DATA_FEEDER_WIF_PROVIDER }}
          service_account: ${{ secrets.DATA_FEEDER_SA_EMAIL }}
      - name: Terraform Init
        run: |
          terraform -chdir=projects/data-feeder init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/data-feeder/dev" \
            -input=false
      - name: Terraform Apply
        run: |
          terraform -chdir=projects/data-feeder apply \
            -var-file="environments/dev/terraform.tfvars" \
            -input=false \
            -auto-approve

  # ── data-feeder/staging (after dev succeeds) ─────────────────────────────────
  apply-data-feeder-staging:
    needs: [detect-changes, apply-data-feeder-dev]
    if: |
      github.event_name == 'push' &&
      needs.detect-changes.outputs.data-feeder == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.DATA_FEEDER_WIF_PROVIDER }}
          service_account: ${{ secrets.DATA_FEEDER_SA_EMAIL }}
      - name: Terraform Init
        run: |
          terraform -chdir=projects/data-feeder init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/data-feeder/staging" \
            -input=false
      - name: Terraform Apply
        run: |
          terraform -chdir=projects/data-feeder apply \
            -var-file="environments/staging/terraform.tfvars" \
            -input=false \
            -auto-approve

  # ── data-feeder/prod (after staging succeeds) ────────────────────────────────
  apply-data-feeder-prod:
    needs: [detect-changes, apply-data-feeder-staging]
    if: |
      github.event_name == 'push' &&
      needs.detect-changes.outputs.data-feeder == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.DATA_FEEDER_WIF_PROVIDER }}
          service_account: ${{ secrets.DATA_FEEDER_SA_EMAIL }}
      - name: Terraform Init
        run: |
          terraform -chdir=projects/data-feeder init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/data-feeder/prod" \
            -input=false
      - name: Terraform Apply
        run: |
          terraform -chdir=projects/data-feeder apply \
            -var-file="environments/prod/terraform.tfvars" \
            -input=false \
            -auto-approve

  # ── Manual dispatch ───────────────────────────────────────────────────────────
  apply-dispatch:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Authenticate (home-plant-tracker)
        if: inputs.project == 'home-plant-tracker'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.HOME_PLANT_TRACKER_WIF_PROVIDER }}
          service_account: ${{ secrets.HOME_PLANT_TRACKER_SA_EMAIL }}

      - name: Authenticate (data-feeder)
        if: inputs.project == 'data-feeder'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.DATA_FEEDER_WIF_PROVIDER }}
          service_account: ${{ secrets.DATA_FEEDER_SA_EMAIL }}

      - name: Terraform Init
        run: |
          terraform -chdir=projects/${{ inputs.project }} init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/${{ inputs.project }}/${{ inputs.environment }}" \
            -input=false

      - name: Terraform Apply (home-plant-tracker)
        if: inputs.project == 'home-plant-tracker'
        run: |
          terraform -chdir=projects/home-plant-tracker apply \
            -var-file="environments/${{ inputs.environment }}/terraform.tfvars" \
            -var="gemini_api_key=${{ secrets.GEMINI_API_KEY }}" \
            -var="function_source_object=${{ inputs.function_source_object || secrets.HOME_PLANT_TRACKER_FUNCTION_SOURCE_OBJECT }}" \
            -input=false \
            -auto-approve

      - name: Terraform Apply (data-feeder)
        if: inputs.project == 'data-feeder'
        run: |
          terraform -chdir=projects/data-feeder apply \
            -var-file="environments/${{ inputs.environment }}/terraform.tfvars" \
            -input=false \
            -auto-approve
