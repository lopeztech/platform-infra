name: home-plant-tracker — Apply

on:
  push:
    branches:
      - master
    paths:
      - 'projects/home-plant-tracker/**'
      - 'modules/**'
  workflow_dispatch:
    inputs:
      function_source_object:
        description: 'Cloud Function source ZIP object name (leave blank to use stored secret)'
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: production
    env:
      TF_DIR: projects/home-plant-tracker
      TF_ENV: prod
      TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.6"

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-providers-${{ hashFiles('projects/home-plant-tracker/.terraform.lock.hcl') }}
          restore-keys: terraform-providers-

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.HOME_PLANT_TRACKER_WIF_PROVIDER }}
          service_account: ${{ secrets.HOME_PLANT_TRACKER_SA_EMAIL }}

      - name: Terraform Init
        run: |
          terraform -chdir=${{ env.TF_DIR }} init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/home-plant-tracker/${{ env.TF_ENV }}" \
            -input=false

      - name: Terraform Apply
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          terraform -chdir=${{ env.TF_DIR }} apply \
            -var-file="environments/${{ env.TF_ENV }}/terraform.tfvars" \
            -var="ml_admin_token=${{ secrets.ML_ADMIN_TOKEN }}" \
            -var="function_source_object=${{ inputs.function_source_object || secrets.HOME_PLANT_TRACKER_FUNCTION_SOURCE_OBJECT }}" \
            -var="billing_account=${{ secrets.BILLING_ACCOUNT_ID }}" \
            -input=false \
            -auto-approve \
            -parallelism=30

  verify:
    needs: apply
    if: always() && needs.apply.result == 'success'
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: home-plant-tracker-lcd
      REGION: australia-southeast1
      DOMAIN: plants.lopezcloud.dev
      ENV: prod
    steps:
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.HOME_PLANT_TRACKER_WIF_PROVIDER }}
          service_account: ${{ secrets.HOME_PLANT_TRACKER_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Verify infrastructure
        run: |
          set -euo pipefail
          PASS=0; FAIL=0; ERRORS=()

          check() {
            local label="$1"; shift
            if "$@" &>/dev/null; then
              echo "  ✅ $label"; ((PASS++)) || true
            else
              echo "  ❌ $label"; ((FAIL++)) || true; ERRORS+=("$label")
            fi
          }

          echo "── Cloud Function ──"
          check "Cloud Function: plant-tracker-plants-api" \
            gcloud functions describe plant-tracker-plants-api --project="$PROJECT_ID" --region="$REGION" --gen2 --format="value(name)"

          echo "── Firebase Hosting ──"
          check "Firebase Hosting site: plant-tracker-${ENV}" \
            curl -sf -H "Authorization: Bearer $(gcloud auth print-access-token)" \
              "https://firebasehosting.googleapis.com/v1beta1/projects/${PROJECT_ID}/sites/plant-tracker-${ENV}"

          echo "── API Gateway ──"
          check "API Gateway: plant-tracker-gateway-${ENV}" \
            gcloud api-gateway gateways describe "plant-tracker-gateway-${ENV}" --project="$PROJECT_ID" --location="$REGION" --format="value(name)"

          echo ""
          echo "════════════════════════════════════════"
          echo "  Passed: $PASS  Failed: $FAIL"
          if [[ ${#ERRORS[@]} -gt 0 ]]; then
            echo "  Failures:"
            for e in "${ERRORS[@]}"; do echo "    - $e"; done
          fi
          echo "════════════════════════════════════════"
          [[ $FAIL -eq 0 ]]
