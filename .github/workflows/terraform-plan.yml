name: Terraform Plan

on:
  pull_request:
    paths:
      - 'projects/**'
      - 'modules/**'
      - 'bootstrap/**'

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  # ── Detect which project directories changed ────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      home-plant-tracker: ${{ steps.filter.outputs.home-plant-tracker }}
      data-feeder: ${{ steps.filter.outputs.data-feeder }}
      sre-monitor: ${{ steps.filter.outputs.sre-monitor }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            home-plant-tracker:
              - 'projects/home-plant-tracker/**'
              - 'modules/**'
            data-feeder:
              - 'projects/data-feeder/**'
              - 'modules/**'
            sre-monitor:
              - 'projects/sre-monitor/**'

  # ── home-plant-tracker ──────────────────────────────────────────────────────
  plan-home-plant-tracker:
    needs: detect-changes
    if: needs.detect-changes.outputs.home-plant-tracker == 'true'
    runs-on: ubuntu-latest
    env:
      TF_DIR: projects/home-plant-tracker
      TF_ENV: prod
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.HOME_PLANT_TRACKER_WIF_PROVIDER }}
          service_account: ${{ secrets.HOME_PLANT_TRACKER_SA_EMAIL }}

      - name: Terraform Init
        run: |
          terraform -chdir=${{ env.TF_DIR }} init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/home-plant-tracker/${{ env.TF_ENV }}" \
            -input=false

      - name: Terraform Plan
        id: plan
        run: |
          terraform -chdir=${{ env.TF_DIR }} plan \
            -var-file="environments/${{ env.TF_ENV }}/terraform.tfvars" \
            -var="gemini_api_key=${{ secrets.GEMINI_API_KEY }}" \
            -var="function_source_object=${{ secrets.HOME_PLANT_TRACKER_FUNCTION_SOURCE_OBJECT || 'placeholder-initial.zip' }}" \
            -input=false \
            -no-color \
            -out=tfplan 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Comment plan on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(-60000) + '\n\n...(truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — \`home-plant-tracker/prod\`\n\`\`\`\n${truncated}\n\`\`\``
            });

  # ── data-feeder ─────────────────────────────────────────────────────────────
  plan-data-feeder:
    needs: detect-changes
    if: needs.detect-changes.outputs.data-feeder == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, staging, prod]
    env:
      TF_DIR: projects/data-feeder
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.DATA_FEEDER_WIF_PROVIDER }}
          service_account: ${{ secrets.DATA_FEEDER_SA_EMAIL }}

      - name: Terraform Init
        run: |
          terraform -chdir=${{ env.TF_DIR }} init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/data-feeder/${{ matrix.env }}" \
            -input=false

      - name: Terraform Plan
        id: plan
        run: |
          terraform -chdir=${{ env.TF_DIR }} plan \
            -var-file="environments/${{ matrix.env }}/terraform.tfvars" \
            -input=false \
            -no-color \
            -out=tfplan 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Comment plan on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(-60000) + '\n\n...(truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — \`data-feeder/${{ matrix.env }}\`\n\`\`\`\n${truncated}\n\`\`\``
            });

  # ── sre-monitor ──────────────────────────────────────────────────────────────
  plan-sre-monitor:
    needs: detect-changes
    if: needs.detect-changes.outputs.sre-monitor == 'true'
    runs-on: ubuntu-latest
    env:
      TF_DIR: projects/sre-monitor
      TF_ENV: prod
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.SRE_MONITOR_WIF_PROVIDER }}
          service_account: ${{ secrets.SRE_MONITOR_SA_EMAIL }}

      - name: Terraform Init
        run: |
          terraform -chdir=${{ env.TF_DIR }} init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/sre-monitor/${{ env.TF_ENV }}" \
            -input=false

      - name: Terraform Plan
        id: plan
        run: |
          terraform -chdir=${{ env.TF_DIR }} plan \
            -var-file="environments/${{ env.TF_ENV }}/terraform.tfvars" \
            -input=false \
            -no-color \
            -out=tfplan 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Comment plan on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(-60000) + '\n\n...(truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — \`sre-monitor/prod\`\n\`\`\`\n${truncated}\n\`\`\``
            });
